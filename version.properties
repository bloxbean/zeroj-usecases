# Single source of truth for ALL zeroj-usecases versions.
#
# Release: bump `version`, commit, and tag `v<version>` (e.g. v0.1.0-pre1) to trigger a release.
# Dependencies: the zeroj / julc / cardano-client versions every usecase builds against
# (published to Maven Central).
#
# Read by every build.gradle (walking up to the repo root) and by gradle/usecase-versions.gradle.
# Override any of these locally with -P<name>=<x> (e.g. -PreleaseVersion, -PzerojVersion).

# --- release version of this repo ---
version=0.1.0-pre6

# --- dependency versions ---
zerojVersion=0.1.0-pre9
julcVersion=0.1.0-pre14
cclVersion=0.8.0-pre4
