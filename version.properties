# Single source of truth for the zeroj-usecases release version.
# Bump this, commit, and tag `v<version>` (e.g. v0.1.0-pre1) to trigger a release.
# Each build.gradle reads this (walking up to the repo root); the release workflows also
# derive the version from the `v*` tag. Override locally with -PreleaseVersion=<x>.
version=0.1.0-pre1
