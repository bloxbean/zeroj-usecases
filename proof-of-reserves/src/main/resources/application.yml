server:
  port: 8089

spring:
  application:
    name: proof-of-reserves-demo
  datasource:
    url: jdbc:h2:file:./data/reserves-db;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

cardano:
  network: yaci
  yaci:
    base-url: http://localhost:8080/api/v1/
    admin-url: http://localhost:10000
    mnemonic: "test test test test test test test test test test test test test test test test test test test test test test test sauce"

zk:
  tree-depth: 4  # 2^4 = 16 accounts max per proof
  pot-power: 13
