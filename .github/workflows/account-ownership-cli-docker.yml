name: account-ownership-recovery-cli — GHCR image

# Manually build the Account-Ownership Proof CLI and push its Docker image to GitHub Container
# Registry (ghcr.io). Trigger from the Actions tab (workflow_dispatch).
#
# ZeroJ, Julc and cardano-client-lib all resolve from Maven Central — the versions the CLI pins in
# gradle.properties must be published there. (Requires zeroj >= the version that ships
# zeroj-crypto-blst on Central.)
#
# The image version defaults to `version` in the CLI's build.gradle, or override it via the input.
# One-time: set the package visibility to Public (repo Packages settings) so anonymous `docker pull`
# works and it stays free.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag (blank = read `version` from the CLI build.gradle)'
        required: false
        default: ''
      latest:
        description: 'Also push :latest'
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

jobs:
  ghcr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Build the CLI fat jar (dependencies from Maven Central)
        run: cd account-ownership-recovery-cli && ./gradlew fatJar --no-daemon

      - name: Resolve image version
        id: ver
        env:
          IN_VERSION: ${{ inputs.version }}
        run: |
          V="$IN_VERSION"
          if [ -z "$V" ]; then
            V=$(grep -m1 "^version" account-ownership-recovery-cli/build.gradle \
                | sed -E "s/.*'([^']+)'.*/\1/")
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Image version: $V"

      - name: Docker metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/account-ownership-recovery-cli
          tags: |
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=latest,enable=${{ inputs.latest }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: account-ownership-recovery-cli
          file: account-ownership-recovery-cli/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Summary
        run: |
          {
            echo "### Pushed image"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
