name: release (account-ownership-recovery-cli)

# Builds the Account-Ownership Proof CLI fat-jar + native zips and attaches them to a GitHub Release.
#
#   preview : Actions ▸ Run workflow            → builds + uploads the zips as a workflow ARTIFACT
#   release : push a repo tag  v<version>        → uploads the zips to the GitHub RELEASE for that tag
#
# The release version comes from the tag (`v0.1.0-pre1` -> 0.1.0-pre1), which should match
# version.properties at the repo root. ZeroJ / Julc / cardano-client-lib resolve from Maven Central.
#
# Future usecases (private-voting, …) can be added as extra build/upload steps here.

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25 (GraalVM, for the native image)
        uses: actions/setup-java@v4
        with:
          distribution: 'graalvm'
          java-version: '25'

      - name: Resolve release version (tag > version.properties)
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V=$(grep -m1 '^version' version.properties | cut -d= -f2)
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Release version: $V"

      - name: Build fat-jar distZip (deps from Maven Central)
        run: cd account-ownership-recovery-cli && ./gradlew distZip -PreleaseVersion=${{ steps.ver.outputs.version }} --no-daemon

      - name: Build native binary zip (this runner's platform)
        run: cd account-ownership-recovery-cli && ./gradlew nativeDistZip -PreleaseVersion=${{ steps.ver.outputs.version }} --no-daemon
        # For all-platform native binaries, run this job on a linux/macos/windows × x64/arm64 matrix.

      - name: Upload workflow artifact (preview + release)
        uses: actions/upload-artifact@v4
        with:
          name: account-ownership-recovery-cli-${{ steps.ver.outputs.version }}
          path: account-ownership-recovery-cli/build/dist/*.zip

      - name: Attach to the GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: account-ownership-recovery-cli/build/dist/*.zip
          fail_on_unmatched_files: true
