plugins {
    id 'java'
    id 'application'
}

group = 'com.bloxbean.cardano.zeroj.usecases'
// Release version: repo-wide version.properties (single source), overridable with -PreleaseVersion.
version = project.findProperty('releaseVersion') ?: {
    for (def dir = projectDir; dir != null; dir = dir.parentFile) {
        def vf = new File(dir, 'version.properties')
        if (vf.isFile()) { def p = new Properties(); vf.withInputStream { p.load(it) }; return p.getProperty('version') }
    }
    return '0.1.0-SNAPSHOT'
}()
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

repositories {
    mavenLocal()
    mavenCentral()
    maven {
        url = uri("https://central.sonatype.com/repository/maven-snapshots")
        content { snapshotsOnly() }
    }
}

def usecaseVersionsScript = {
    def dir = projectDir
    while (dir != null) {
        def candidate = new File(dir, 'gradle/usecase-versions.gradle')
        if (candidate.isFile()) {
            return candidate
        }
        dir = dir.parentFile
    }
    throw new GradleException('Could not find gradle/usecase-versions.gradle')
}()
apply from: usecaseVersionsScript

dependencies {
    implementation "com.bloxbean.cardano:zeroj-api:${zerojVersion}"
    implementation "com.bloxbean.cardano:zeroj-circuit-dsl:${zerojVersion}"
    implementation "com.bloxbean.cardano:zeroj-circuit-lib:${zerojVersion}"
    implementation "com.bloxbean.cardano:zeroj-circuit-annotation-api:${zerojVersion}"
    implementation "com.bloxbean.cardano:zeroj-mpf-poseidon:${zerojVersion}"
    annotationProcessor "com.bloxbean.cardano:zeroj-circuit-annotation-processor:${zerojVersion}"

    testImplementation platform('org.junit:junit-bom:5.11.4')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

application {
    mainClass = 'com.bloxbean.cardano.zeroj.usecases.mpf.PrivateRegistryDemo'
}

tasks.withType(JavaCompile).configureEach {
    options.compilerArgs.add('-proc:full')
}

test {
    useJUnitPlatform()
    maxHeapSize = '4g'
    jvmArgs '--enable-native-access=ALL-UNNAMED'
    testLogging {
        events "passed", "failed", "skipped"
    }
}
